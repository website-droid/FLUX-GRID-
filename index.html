<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartDeals254 | Enterprise Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); }
        .input-pro { background: #0f172a; border: 1px solid #334155; padding: 16px; border-radius: 12px; width: 100%; color: white; transition: 0.3s; }
        .input-pro:focus { border-color: #6366f1; outline: none; box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.3); }
        .btn-glow { box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10 flex flex-col items-center">

    <canvas id="bgCanvas"></canvas>

    <div id="authScreen" class="glass w-full max-w-md p-8 rounded-3xl shadow-2xl mt-10">
        <h2 class="text-3xl font-black text-indigo-400 mb-2">Login</h2>
        <p class="text-slate-400 mb-6">SmartDeals254 Staff Access</p>
        <input type="email" id="email" placeholder="Email" class="input-pro mb-4">
        <input type="password" id="password" placeholder="Password" class="input-pro mb-6">
        <div class="flex gap-4">
            <button onclick="handleAuth('login')" class="flex-1 bg-indigo-600 hover:bg-indigo-700 py-4 rounded-xl font-bold">Login</button>
            <button onclick="handleAuth('signup')" class="flex-1 bg-slate-700 hover:bg-slate-600 py-4 rounded-xl font-bold">Register</button>
        </div>
    </div>

    <div id="dashboard" class="hidden glass w-full max-w-4xl p-10 rounded-3xl shadow-2xl">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h1 class="text-4xl font-black">Institution Portal</h1>
                <p class="text-indigo-400 font-bold tracking-widest uppercase text-sm">Secure Data Entry v3.0</p>
            </div>
            <a href="https://wa.me/254717883986" target="_blank" class="bg-green-600 hover:bg-green-700 px-8 py-4 rounded-full font-bold transition-all btn-glow animate-pulse">
                💬 WhatsApp Support
            </a>
        </div>

        <form id="massiveForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <input type="text" id="sName" placeholder="School Name" class="input-pro" required>
            <input type="number" id="fYear" placeholder="Year Founded" class="input-pro" required>
            <input type="text" id="addr" placeholder="Location" class="input-pro col-span-1 md:col-span-2" required>
            <textarea id="desc" placeholder="School History & Vision" rows="4" class="input-pro col-span-1 md:col-span-2"></textarea>
            
            <div class="col-span-1 md:col-span-2 border-2 border-dashed border-slate-700 p-6 rounded-2xl text-center hover:border-indigo-500 transition-colors">
                <input type="file" id="imgUpload" class="hidden" accept="image/*" onchange="previewImg()">
                <label for="imgUpload" class="cursor-pointer text-indigo-400 font-bold">Select Institution Banner</label>
                <img id="preview" class="mt-4 mx-auto max-h-40 rounded hidden">
            </div>

            <button type="submit" id="submitBtn" class="col-span-1 md:col-span-2 bg-indigo-600 hover:bg-indigo-700 p-5 rounded-2xl text-xl font-bold transition-all btn-glow">
                Publish Official Record
            </button>
        </form>
    </div>

    <script>
        const supabase = supabase.createClient('https://gzzlppyncdfhsqfrzavx.supabase.co', 'sb_publishable_KqIEbQGbVAKg2vAkWlNEZA_IFIrVav8');

        // AUTH LOGIC
        async function handleAuth(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = type === 'login' ? await supabase.auth.signInWithPassword({ email, password }) : await supabase.auth.signUp({ email, password });
            if (error) alert(error.message); else location.reload();
        }

        supabase.auth.getSession().then(({ data }) => {
            if (data.session) {
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
            }
        });

        // ANIMATION
        const c = document.getElementById('bgCanvas'), ctx = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        let p = Array.from({length: 80}, () => ({x: Math.random()*c.width, y: Math.random()*c.height, s: Math.random()*2}));
        function animate() {
            ctx.clearRect(0,0,c.width, c.height);
            ctx.fillStyle = '#4f46e533';
            p.forEach(pt => { pt.y -= 0.3; if(pt.y < 0) pt.y = c.height; ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.s, 0, Math.PI*2); ctx.fill(); });
            requestAnimationFrame(animate);
        } animate();

        // FORM LOGIC
        function previewImg() {
            const reader = new FileReader();
            reader.onload = e => { const i = document.getElementById('preview'); i.src = e.target.result; i.classList.remove('hidden'); };
            reader.readAsDataURL(document.getElementById('imgUpload').files[0]);
        }

        document.getElementById('massiveForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = 'Syncing Secure Data...';
            
            const file = document.getElementById('imgUpload').files[0];
            const name = `${Date.now()}_${file.name}`;
            await supabase.storage.from('school-assets').upload(name, file);
            const { data: { publicUrl } } = supabase.storage.from('school-assets').getPublicUrl(name);

            const { error } = await supabase.from('schools').insert([{
                name: document.getElementById('sName').value,
                founded_year: document.getElementById('fYear').value,
                address: document.getElementById('addr').value,
                description: document.getElementById('desc').value,
                image_url: publicUrl,
                user_id: (await supabase.auth.getSession()).data.session.user.id
            }]);

            if (error) alert('Error: ' + error.message);
            else { alert('Success: Record published to private database!'); btn.innerText = 'Publish Official Record'; document.getElementById('massiveForm').reset(); }
        });
    </script>
</body>
</html>
